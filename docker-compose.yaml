services:
  # -----------------------------------------------
  # PostgreSQL (LEDGER — HIGH TRUST, HARDENED)
  # -----------------------------------------------
  postgres:
    image: postgres:16
    container_name: rwa-ledger-db
    restart: always
    environment:
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: ledger_pass
      POSTGRES_DB: rwa
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - internal
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_user -d rwa"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "5433:5432"

  # -----------------------------------------------
  # RWA Tokenization Service
  # -----------------------------------------------
  rwa-service:
    build: ./rwa-service
    container_name: rwa-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rwa
      DB_USER: ledger_user
      DB_PASSWORD: ledger_pass
      KAFKA_BROKER: kafka:9092   # INTERNAL listener
    networks:
      - backend
      - internal
    restart: on-failure

  # -----------------------------------------------
  # Outbox Publisher
  # -----------------------------------------------
  outbox-publisher:
    build: ./outbox
    container_name: rwa-outbox-publisher
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rwa
      DB_USER: readonly_user
      DB_PASSWORD: readonly_pass
      KAFKA_BROKER: kafka:9092   # INTERNAL listener
    networks:
      - backend
      - internal
    restart: on-failure

  # -----------------------------------------------
  # Zookeeper
  # -----------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rwa-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - backend

  # -----------------------------------------------
  # Kafka
  # -----------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rwa-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"   # 👈 host access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # 👇 Dual listener setup (THIS IS THE FIX)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend
    restart: always

  # -----------------------------------------------
  # Signing Gateway
  # -----------------------------------------------
  signing-gateway:
    build: ./signing-gateway
    container_name: rwa-signing-gateway
    depends_on:
      - mpc-node-1
      - mpc-node-2
      - mpc-node-3
    environment:
      MPC_NODES: "mpc-node-1:8001,mpc-node-2:8001,mpc-node-3:8001"
    networks:
      - backend
      - signing
    restart: on-failure

  # -----------------------------------------------
  # MPC Nodes
  # -----------------------------------------------
  mpc-node-1:
    build: ./mpc
    container_name: rwa-mpc-node-1
    environment:
      NODE_ID: 1
    networks:
      - signing
    restart: on-failure

  mpc-node-2:
    build: ./mpc
    container_name: rwa-mpc-node-2
    environment:
      NODE_ID: 2
    networks:
      - signing
    restart: on-failure

  mpc-node-3:
    build: ./mpc
    container_name: rwa-mpc-node-3
    environment:
      NODE_ID: 3
    networks:
      - signing
    restart: on-failure

# -----------------------------------------------
# Networks
# -----------------------------------------------
networks:
  backend:

  internal:
    internal: true

  signing:
    internal: true

volumes:
  postgres_data:
